# CI Ciné+ (6.0 §7, H84) — lint + build + E2E/a11y bloquants sur chaque push/PR.
# Lighthouse CI (budgets D26, app/lighthouserc.json) s'ajoutera une fois le
# projet stabilisé sur les runners (H79).
name: CI

on:
  push:
    branches: ["claude/premium-film-discovery-platform-72gfbs"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Installer les dépendances
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build de production
        run: npm run build
      - name: Installer Chromium Playwright
        run: npx playwright install --with-deps chromium
      - name: Tests E2E + accessibilité (bloquants)
        run: npm run test:e2e
        env:
          CI: "true"
      - name: Rapport Playwright (si échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7
