# Suppression d'un compte par e-mail — utile en phase de bootstrap quand un
# essai d'inscription précédent laisse un compte au mot de passe oublié.
# À ne plus utiliser une fois le site réellement ouvert au public (préférer
# alors /admin/utilisateurs).
name: Réinitialiser un compte

on:
  workflow_dispatch:
    inputs:
      email:
        description: "Adresse e-mail du compte à supprimer"
        required: true

jobs:
  reset:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Supprimer le compte
        run: node scripts/reset-user.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TARGET_EMAIL: ${{ inputs.email }}
