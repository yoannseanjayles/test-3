# Migration de la base de données (Drizzle) — déclenchement manuel.
# Utile au bootstrap initial (Bloc 2 du guide d'activation) et à chaque
# nouvelle migration versionnée dans app/drizzle/.
name: Migration de la base de données

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Installer les dépendances
        run: npm ci
      - name: Appliquer les migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
