# Diagnostic ciblé : rejoue le hash argon2 + l'insertion SQL de l'inscription
# avec un e-mail jetable, pour voir l'erreur réelle derrière le message
# générique "Impossible de créer un compte avec cette adresse".
name: Diagnostiquer l'inscription

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Rejouer hash + insertion
        run: node scripts/diag-register.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
